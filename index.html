<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Daily Log - Fixed UI</title>
    <style>
        body { 
            font-family: sans-serif; 
            margin: 0; 
            background: #121212; 
            color: #e0e0e0; 
            /* 画面の高さを固定（dvhはキーボード出現時を考慮した高さ） */
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* ボディ全体のスクロールを禁止 */
            /* iPhoneのノッチ（上の出っ張り）対策 */
            padding-top: env(safe-area-inset-top);
        }

        /* ヘッダー：画面上部に固定 */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 15px;
            background: #121212; /* 入力欄が潜り込んでも見えないように背景を指定 */
            z-index: 10;
            border-bottom: 1px solid #333;
        }

        #count { 
            font-size: 14px; 
            font-weight: bold;
        }

        /* カウントカラー */
        .yellow { color: #f1c40f; }
        .green { color: #2ecc71; }
        .red { color: #e74c3c; }

        button { 
            background: #2980b9; 
            color: white; 
            border: none; 
            padding: 8px 18px; 
            border-radius: 20px; 
            font-size: 14px; 
            font-weight: bold;
        }

        /* 入力エリア：ここだけがスクロールする */
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
            overflow: hidden;
        }

        textarea { 
            flex: 1;
            width: 100%; 
            padding: 10px; 
            background: transparent; /* 背景と一体化 */
            color: #ffffff; 
            border: none; 
            font-size: 16px; 
            box-sizing: border-box; 
            outline: none; 
            resize: none; 
            line-height: 1.6;
            /* 入力欄の中だけでスクロールさせる */
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; /* iOSでのスクロールを滑らかに */
        }
    </style>
</head>
<body>

<div class="header">
    <div id="count" class="yellow">0 文字</div>
    <button onclick="copyAndClear()">コピーして完了</button>
</div>

<div class="editor-container">
    <textarea id="logger" placeholder="quantity over quality." autofocus></textarea>
</div>

<script>
    const textarea = document.getElementById('logger');
    const countDisplay = document.getElementById('count');

    textarea.addEventListener('input', () => {
        const len = textarea.value.length;
        countDisplay.textContent = `${len} 文字`;
        if (len < 300) {
            countDisplay.className = 'yellow';
        } else if (len <= 800) {
            countDisplay.className = 'green';
        } else {
            countDisplay.className = 'red';
        }
    });

    function getCustomDate() {
        const now = new Date();
        const adjustedDate = new Date(now.getTime() - (6 * 60 * 60 * 1000));
        const y = adjustedDate.getFullYear();
        const m = String(adjustedDate.getMonth() + 1).padStart(2, '0');
        const d = String(adjustedDate.getDate()).padStart(2, '0');
        const week = ['日', '月', '火', '水', '木', '金', '土'][adjustedDate.getDay()];
        return `■${y}.${m}.${d}(${week})`;
    }

    async function copyAndClear() {
        if (textarea.value.trim() === "") return;
        const confirmCheck = confirm("ライフログをコピーしますか？\n（OKでテキストは消去されます）");
        if (confirmCheck) {
            const title = getCustomDate();
            const fullText = `${title}\n${textarea.value}`;
            try {
                await navigator.clipboard.writeText(fullText);
                alert("コピーしました！");
                textarea.value = ""; 
                countDisplay.textContent = "0 文字";
                countDisplay.className = 'yellow';
            } catch (err) {
                alert("コピーに失敗しました。");
            }
        }
    }
</script>

</body>
</html>
